<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>Fruit Slicer - Full Data Insights</title>
  <style>
    body { background: #0d0d1a; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; }
    h1 { color: #00e5ff; border-bottom: 2px solid #333; padding-bottom: 10px; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab-btn { background: #1a1a2e; color: #888; border: 2px solid #333; padding: 12px 24px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold; }
    .tab-btn.active { background: #00e5ff; color: #0d0d1a; border-color: #00e5ff; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Table Design */
    table { width: 100%; border-collapse: collapse; background: #1a1a2e; border-radius: 10px; overflow: hidden; margin-top: 10px; }
    th, td { padding: 15px; text-align: left; border-bottom: 1px solid #2a2a4e; }
    th { background: #2a2a4e; color: #00e5ff; text-transform: uppercase; font-size: 13px; }
    /* ทำให้กดง่ายทั้งแถว */
    .player-row:hover { background: #232344; cursor: pointer; transition: 0.2s; }

    /* Modal Style */
    #user-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; overflow-y: auto; }
    .modal-content { background: #16213e; margin: 5% auto; padding: 30px; width: 90%; max-width: 900px; border-radius: 15px; border: 1px solid #00e5ff; }
    .close-btn { float: right; font-size: 28px; cursor: pointer; color: #ff4488; }
    .session-card { background: #0d0d1a; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #00e5ff; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; font-size: 13px; }
    
    /* Toolbar (Sort & Export) */
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: #1a1a2e; padding: 10px 15px; border-radius: 8px; }
    select { background: #0d0d1a; color: #00e5ff; border: 1px solid #333; padding: 8px; border-radius: 4px; outline: none; cursor: pointer; font-weight: bold; }
    .btn-export { background: #00ff88; color: #0d0d1a; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    .btn-export:hover { background: #00cc66; }
  </style>
</head>
<body>

<div class="container">
  <h1>📊 Fruit Slicer - Admin Insights</h1>
  
  <div class="tabs">
    <button id="btn-players" class="tab-btn active">👥 รายชื่อผู้เล่น</button>
    <button id="btn-feedbacks" class="tab-btn">💬 ฟีดแบคทั้งหมด</button>
  </div>

<div class="toolbar">
      <div>
        <label for="sort-players" style="color:#aaa; font-size:14px; margin-right:10px;">จัดเรียงตาม:</label>
        <select id="sort-players">
          <option value="playCountDesc">จำนวนรอบ (มากไปน้อย)</option>
          <option value="scoreBDesc">คะแนนโหมด B (มากไปน้อย)</option>
          <option value="scoreADesc">คะแนนโหมด A (มากไปน้อย)</option>
          <option value="dateDesc">สมัครล่าสุด</option>
        </select>
      </div>
      <div style="display: flex; gap: 10px;">
        <button id="btn-export-csv" class="btn-export" style="background: #2a2a4e; color: #fff;">📥 โหลด Summary</button>
        <button id="btn-export-all-sessions" class="btn-export">📥 โหลด All Sessions (แบบละเอียด)</button>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Username</th>
          <th>คะแนน (A/B)</th>
          <th>จำนวนรอบ</th>
          <th>เวลารวมที่เล่น</th>
          <th>ความชอบล่าสุด (A/B)</th> <th>สมัครเมื่อ</th>
          <th>จัดการ</th>
        </tr>
      </thead>
      <tbody id="players-tbody"></tbody>
    </table>

  <div id="tab-feedbacks" class="tab-content">
    <div id="feedbacks-container"></div>
  </div>
</div>

<div id="user-modal">
  <div class="modal-content">
    <span class="close-btn" onclick="document.getElementById('user-modal').style.display = 'none';">&times;</span>
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
      <h2 id="modal-title" style="color: #00e5ff; margin: 0;">ข้อมูลการเล่นของ: </h2>
      <button id="btn-export-user" class="btn-export" style="background: #ff0088; color: white;">📥 โหลดข้อมูลคนนี้ (CSV)</button>
    </div>
    <div id="session-history"></div>
  </div>
</div>

<script type="module" src="/src/admin.js"></script>
</body>
</html>
